<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TariffAI — Поиск тарифов</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap">

    <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/page/search.css') }}">
</head>
<body>
<nav>
    <a href="/home" class="logo">Tariff<em>AI</em></a>
    <ul>
        <li><a href="/home">Главная</a></li>
        <li><a href="/search" class="active">Поиск</a></li>
        <li><a href="/search_ai">AI-Поиск</a></li>
        <li><a href="/compare">Сравнение</a></li>
    </ul>
    <div></div>
</nav>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-head">
            <div class="sidebar-title">Фильтры</div>
            <button class="reset-btn" onclick="resetAll()">Сбросить всё</button>
        </div>

        <div class="filter-block">
            <div class="filter-label">Цена в месяц</div>
            <div class="range-container">
                <div class="range-slider-wrap">
                    <div class="range-fill-bar" id="priceFill"></div>
                    <label for="priceMin">
                        <input type="range" class="rng-min" id="priceMin" min="0" max="2000" value="0" step="50">
                    </label>
                    <label for="priceMax">
                        <input type="range" class="rng-max" id="priceMax" min="0" max="2000" value="2000" step="50">
                    </label>
                </div>
                <div class="range-vals">
                    <div class="range-val" id="priceMinLbl">0 <span>₽</span></div>
                    <div class="range-val" id="priceMaxLbl">2000 <span>₽</span></div>
                </div>
            </div>
        </div>

        <div class="filter-block">
            <div class="filter-label">Интернет (ГБ)</div>
            <div class="range-container">
                <div class="range-slider-wrap">
                    <div class="range-fill-bar" id="gbFill"></div>
                    <label for="gbMin">
                        <input type="range" class="rng-min" id="gbMin" min="0" max="100" value="0" step="1">
                    </label>
                    <label for="gbMax">
                        <input type="range" class="rng-max" id="gbMax" min="0" max="100" value="100" step="1">
                    </label>
                </div>
                <div class="range-vals">
                    <div class="range-val" id="gbMinLbl">0 <span>ГБ</span></div>
                    <div class="range-val" id="gbMaxLbl">∞</div>
                </div>
            </div>
        </div>

        <div class="filter-block">
            <div class="filter-label">Минуты</div>
            <div class="range-container">
                <div class="range-slider-wrap">
                    <div class="range-fill-bar" id="minFill"></div>
                    <label for="minMin">
                        <input type="range" class="rng-min" id="minMin" min="0" max="2000" value="0" step="50">
                    </label>
                    <label for="minMax">
                        <input type="range" class="rng-max" id="minMax" min="0" max="2000" value="2000" step="50">
                    </label>
                </div>
                <div class="range-vals">
                    <div class="range-val" id="minMinLbl">0 <span>мин</span></div>
                    <div class="range-val" id="minMaxLbl">∞</div>
                </div>
            </div>
        </div>

        <div class="filter-block">
            <div class="filter-label">SMS</div>
            <div class="range-container">
                <div class="range-slider-wrap">
                    <div class="range-fill-bar" id="smsFill"></div>
                    <label for="smsMin">
                        <input type="range" class="rng-min" id="smsMin" min="0" max="1200" value="0" step="25">
                    </label>
                    <label for="smsMax">
                        <input type="range" class="rng-max" id="smsMax" min="0" max="1200" value="1200" step="25">
                    </label>
                </div>
                <div class="range-vals">
                    <div class="range-val" id="smsMinLbl">0 <span>SMS</span></div>
                    <div class="range-val" id="smsMaxLbl">∞</div>
                </div>
            </div>
        </div>

        <div class="filter-block">
            <div class="filter-label">Безлимит на</div>
            <div class="toggles-grid">
                <button class="toggle-chip" data-key="messengers">💬 Мессенджеры</button>
                <button class="toggle-chip" data-key="social">📱 Соцсети</button>
                <button class="toggle-chip" data-key="video">▶️ Видеохостинги</button>
                <button class="toggle-chip" data-key="music">🎵 Музыка</button>
            </div>
        </div>

        <div class="filter-block">
            <div class="filter-label">Оператор</div>
            <div class="op-btns">
                <button class="op-btn on" data-op="MTC">
                    <div class="op-dot" style="background:#e30613"></div>
                    МТС
                </button>
                <button class="op-btn on" data-op="Билайн">
                    <div class="op-dot" style="background:#f8c300"></div>
                    Билайн
                </button>
                <button class="op-btn on" data-op="Теле2">
                    <div class="op-dot" style="background:#1c1c1c"></div>
                    Теле2
                </button>
                <button class="op-btn on" data-op="МегаФон">
                    <div class="op-dot" style="background:#1d9c4a"></div>
                    МегаФон
                </button>
                <button class="op-btn on" data-op="Yota">
                    <div class="op-dot" style="background:#3eb6e8"></div>
                    Yota
                </button>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="results-bar">
            <div class="results-count"><strong id="resNum">18</strong> тарифов найдено</div>
            <label for="sortSel">
                <select class="sort-sel" id="sortSel" onchange="render()">
                    <option value="price_asc">Сначала дешевле</option>
                    <option value="price_desc">Сначала дороже</option>
                    <option value="gb_desc">Больше интернета</option>
                    <option value="min_desc">Больше минут</option>
                </select>
            </label>
        </div>
        <div class="tariffs-list" id="tariffsList"></div>
    </main>
</div>

<div class="cmp-bar" id="cmpBar">
    <div class="cmp-items" id="cmpItems"></div>
    <div class="cmp-right">
        <span class="cmp-count" id="cmpCount"></span>
        <a href="/compare" class="btn-cmp-go" >Сравнить →</a>
    </div>
</div>

<script src="{{ url_for('static', filename='script/search.js') }}"></script>

</body>
</html>
