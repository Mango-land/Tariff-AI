<div class="card">
    <div class="card-header">
        <div class="operator-badge">
            <div class="operator-logo js-operator-logo"></div>
            <span class="operator-name js-operator-name"></span>
        </div>
        <span class="tariff-name js-name"></span>
    </div>

    <div class="price-block">
        <div class="price">
            <span class="js-price"></span>
            <span class="price-currency">₽</span>
        </div>
        <div class="price-period">в месяц</div>
    </div>

    <div class="features-grid">
        <div class="feature-item">
            <span class="feature-icon">📱</span>
            <div>
                <span class="js-gb-value feature-value"></span>
                <div class="feature-label">ГБ</div>
            </div>
        </div>

        <div class="feature-item">
            <span class="feature-icon">📞</span>
            <div>
                <span class="js-minutes-value feature-value"></span>
                <div class="feature-label">МИН</div>
            </div>
        </div>

        <div class="feature-item">
            <span class="feature-icon">✉️</span>
            <div>
                <span class="js-sms-value feature-value"></span>
                <div class="feature-label">СМС</div>
            </div>
        </div>
    </div>

    <div class="extras js-extras"></div>

    <a href="#" class="btn js-compare-link">Сравнить тариф</a>
</div>
