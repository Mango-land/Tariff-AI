<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | TariffAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="header">
    <div style="display: flex; align-items: center; gap: 2rem; max-width: 1200px; margin: 0 auto;">
        <a href="/home" class="logo">TariffAI</a>
        <nav style="display: flex; gap: 1.5rem;">
            <a href="/search" style="color: var(--primary); text-decoration: none; font-weight: 500;">Поиск</a>
            <a href="/ai_search" style="color: var(--text); text-decoration: none; font-weight: 500;">AI поиск</a>
            <a href="/compare" style="color: var(--text); text-decoration: none; font-weight: 500;">Сравнение</a>
        </nav>
    </div>
</header>

<div class="main-container">
    <aside class="filters-pane">
        <div class="filter-section">
            <h3>Бюджет</h3>
            <div class="val-labels">
                <span id="price-min-val" class="val-badge">0 ₽</span>
                <span id="price-max-val" class="val-badge">1000 ₽</span>
            </div>
            <div class="slider-wrapper">
                <div id="price-track" class="slider-track"></div>
                <input type="range" id="price-min" min="0" max="3000" value="0" step="100">
                <input type="range" id="price-max" min="0" max="3000" value="1000" step="100">
            </div>
        </div>

        <div class="filter-section">
            <h3>Интернет</h3>
            <div class="val-labels">
                <span id="gb-min-val" class="val-badge">0 ГБ</span>
                <span id="gb-max-val" class="val-badge">30 ГБ</span>
            </div>
            <div class="slider-wrapper">
                <div id="gb-track" class="slider-track"></div>
                <input type="range" id="gb-min" min="0" max="51" value="0" step="1">
                <input type="range" id="gb-max" min="0" max="51" value="30" step="1">
            </div>
        </div>

        <div class="filter-section">
            <h3>Минуты</h3>
            <div class="val-labels">
                <span id="min-min-val" class="val-badge">0 мин</span>
                <span id="min-max-val" class="val-badge">600 мин</span>
            </div>
            <div class="slider-wrapper">
                <div id="min-track" class="slider-track"></div>
                <input type="range" id="min-min" min="0" max="2010" value="0" step="10">
                <input type="range" id="min-max" min="0" max="2010" value="600" step="10">
            </div>
        </div>

        <div class="filter-section">
            <h3>SMS</h3>
            <div class="val-labels">
                <span id="sms-min-val" class="val-badge">0 шт</span>
                <span id="sms-max-val" class="val-badge">300 шт</span>
            </div>
            <div class="slider-wrapper">
                <div id="sms-track" class="slider-track"></div>
                <input type="range" id="sms-min" min="0" max="1205" value="0" step="5">
                <input type="range" id="sms-max" min="0" max="1205" value="300" step="5">
            </div>
        </div>

        <div class="filter-section">
            <h3>Безлимит на</h3>
            <div class="toggle-item">Мессенджеры <label class="switch"><input type="checkbox" name="unlimited_messengers"><span class="slider-round"></span></label></div>
            <div class="toggle-item">Соцсети <label class="switch"><input type="checkbox" name="unlimited_social"><span class="slider-round"></span></label></div>
            <div class="toggle-item">Видеохостинги <label class="switch"><input type="checkbox" name="unlimited_video"><span class="slider-round"></span></label></div>
            <div class="toggle-item">Музыка <label class="switch"><input type="checkbox" name="unlimited_music"><span class="slider-round"></span></label></div>
        </div>

        <div class="filter-section">
            <h3>Оператор</h3>
            <div class="operator-buttons" id="operator-buttons">
                <div class="operator-btn" data-operator="mts">
                    <span class="logo mts">М</span>
                    <span>МТС</span>
                </div>
                <div class="operator-btn" data-operator="beeline">
                    <span class="logo beeline">Б</span>
                    <span>Билайн</span>
                </div>
                <div class="operator-btn" data-operator="tele2">
                    <span class="logo tele2">T2</span>
                    <span>Tele2</span>
                </div>
                <div class="operator-btn" data-operator="megafon">
                    <span class="logo megafon">М</span>
                    <span>Мегафон</span>
                </div>
                <div class="operator-btn" data-operator="yota">
                    <span class="logo yota">Y</span>
                    <span>Yota</span>
                </div>
            </div>
        </div>
    </aside>

    <main>
        <div class="tariff-grid" id="tariffGrid"></div>

        <template id="tariff-template">
            {% with gb=0, minutes=0, sms=0, unlimited_messengers=False, unlimited_social=False, unlimited_video=False, unlimited_music=False %}
                {% include 'tariff_card.html' %}
            {% endwith %}
        </template>
    </main>
</div>

<script src="{{ url_for('static', filename='script/search.js') }}"></script>

</body>
</html>
