<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search AI | TariffAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="header">
    <div style="display: flex; align-items: center; gap: 2rem; max-width: 1200px; margin: 0 auto;">
        <a href="/home" class="logo">TariffAI</a>
        <nav style="display: flex; gap: 1.5rem;">
            <a href="/search" style="color: var(--text); text-decoration: none; font-weight: 500;">Поиск</a>
            <a href="/ai_search" style="color: var(--primary); text-decoration: none; font-weight: 500;">AI поиск</a>
            <a href="/compare" style="color: var(--text); text-decoration: none; font-weight: 500;">Сравнение</a>
        </nav>
    </div>
</header>

<main style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <div class="ai-search-section">
        <h1 style="font-size: 2.5rem; font-weight: 800;">Найди идеальный тариф <span class="highlight">с AI</span></h1>
        <p style="color: var(--text-light); margin: 20px 0;">Опишите свои потребности, и нейросеть подберет лучшие предложения</p>
        <div class="ai-search-box">
            <input type="text" class="ai-search-input" id="aiQuery" placeholder="Например: много интернета и звонки безлимитные">
            <button class="ai-search-btn" id="aiSearchBtn">Найти</button>
        </div>
    </div>

    <div class="ai-results-header">
        <h2>Результат поиска</h2>
        <span style="color: var(--text-light);" id="resultCount"></span>
    </div>
    <div class="tariff-grid" id="tariffGrid">

    </div>
</main>

<script src="{{ url_for('static', filename='script/ai_search.js') }}"></script>
</body>
</html>
